<!-- 
TASK: Build a working waitlist form connected to Supabase.

GOAL:
When a user submits their email, it should be stored in a Supabase table called "waitlist".

REQUIREMENTS:
1. Use Supabase JS CDN (no backend server)
2. Connect using:
   - supabaseUrl
   - supabaseAnonKey
3. Create form handler that:
   - prevents page refresh
   - reads email input
   - inserts into Supabase table "waitlist"
4. Show success alert when inserted
5. Show error alert if failed
6. Clear input after success
7. Keep everything inside index.html (no extra files)

SUPABASE TABLE STRUCTURE:
- waitlist
  - id (uuid, auto)
  - email (text, unique)
  - created_at (timestamp default now)

RLS:
- allow anonymous insert (public signup)

IMPORTANT:
- Use supabase.createClient()
- Use insert([{ email }])
- Do NOT use service role key
-->

<!DOCTYPE html>
<html>
<head>
  <title>SolenOS Waitlist</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <h1>Join SolenOS Waitlist</h1>

  <form id="waitlist-form">
    <input type="email" id="email" placeholder="Enter email" required />
    <button type="submit">Join</button>
  </form>

  <script>
    const supabaseUrl = "https://yijsemeiyxfaeygsqzkth.supabase.co"
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpanNlbWVpeGZhZXlnc3F6a3RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTMzMzAsImV4cCI6MjA5NjA4OTMzMH0.KQ_YIKDENACPPcYIwKeYzM8AgGJn_xKoSNfuZM5MrHI"
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById("waitlist-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;

      const { error } = await supabaseClient
        .from("waitlist")
        .insert([{ email }]);

      if (error) {
        alert("Failed to join waitlist");
        console.log(error);
      } else {
        alert("Successfully joined waitlist!");
        document.getElementById("email").value = "";
      }
    });
  </script>

</body>
</html>
